name: FoliaCore
version: 'v5.7-deathwish'
main: dev.ajaretro.foliaCore.FoliaCore
api-version: '1.21'
prefix: "AJA_R3TR0_FoliaCore"
authors: [ AJA RETRO ]
description: The essential plugin suite, rebuilt natively for Folia.
website: ajaretro.dev
folia-supported: true

# Commands are registered programmatically in FoliaCore.java
# See registerCommands() method for runtime command registration

permissions:
  foliacore.msg:
    description: Send private messages.
    default: true
  foliacore.reply:
    description: Reply to the last private message.
    default: true
  foliacore.mail.send:
    description: Send mail to offline players.
    default: true
  foliacore.mail.read:
    description: Read your mailbox.
    default: true
  foliacore.mail.clear:
    description: Clear your mailbox.
    default: false
  foliacore.nick:
    description: Change your nickname.
    default: false
  foliacore.nick.color:
    description: Use color codes in nicknames.
    default: false
  foliacore.help:
    description: View the command help list.
    default: true
  foliacore.version:
    description: View plugin version information.
    default: true
  foliacore.reload:
    description: Reload plugin configuration.
    default: false
  foliacore.realname:
    description: Resolve a nickname to a real player name.
    default: true
  foliacore.block:
    description: Block a player from chatting or mailing you.
    default: true
  foliacore.unblock:
    description: Remove a chat or mail block.
    default: true
  foliacore.chat.global:
    description: Switch to global chat.
