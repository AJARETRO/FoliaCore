# FoliaCore Configuration

# Module Toggles - Set to false to disable entire subsystems
modules:
  teleport: true
  kits: true
  chat: true
  markers: true
  teams: true
  staff: true
  system: true
  utility: true
  tab: true
  sidebar: true
  economy: true
  jails: true
  discord: true

# System Settings
system:
  # Maintenance Mode - Kicks players without foliacore.admin
  maintenance-mode: false
  maintenance-kick-message: "&cServer is in maintenance mode. Admins only."
  
  # First Spawn - Teleports new players to a configured location
  first-spawn-enabled: true
  
  # Entity Cleanup - Removes items and excess mobs when regional TPS drops
  entity-cleanup-enabled: true
  entity-cleanup-interval: 300
  minimum-tps-threshold: 16
  
  # Auto Broadcaster - Sends messages at intervals
  auto-broadcaster-enabled: true
  auto-broadcast-interval: 600

# Startup branding
branding:
  startup-banner-enabled: true
  owner-display: "&4AJA_R3TR0 &8x &bFoliaCore"

# Status command tuning
status:
  show-world-summary: true
  show-region-details: true
  max-regions: 12
  region-chunk-span: 8

# Animated TAB configuration
tab:
  enabled: true
  update-interval-ticks: 20
  header-method: method-1
  footer-method: method-2
  methods:
    method-1:
      - "&6&lFoliaCore &ev3 Nightingale"
      - "&e&lFoliaCore &6v3 Nightingale"
      - "&f&lFoliaCore &ev3 Nightingale"
    method-2:
      - "&7Players: &a%online_players%&7/&a%max_players%"
      - "&7TPS: &b%server_tps% &8| &7Ping: &b%player_ping%ms"
      - "&7World: &d%world_name%"

# Animated Sidebar configuration
sidebar:
  enabled: true
  update-interval-ticks: 20
  title-method: method-1
  line-methods:
    - method-2
    - method-3
    - method-4
    - method-5
    - method-6
  methods:
    method-1:
      - "&6&lNightingale"
      - "&e&lNightingale"
      - "&f&lNightingale"
    method-2:
      - "&7Player: &f%player_name%"
    method-3:
      - "&7Online: &a%online_players%&7/&a%max_players%"
    method-4:
      - "&7TPS: &b%server_tps%"
    method-5:
      - "&7Ping: &b%player_ping%ms"
    method-6:
      - "&7Coords: &f%x% &7/&f%y% &7/&f%z%"

# Unified Storage System Settings
storage:
  # Available types: yaml, mysql
  type: yaml
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""
    ssl: false

# Economy Module Settings
economy:
  default-balance: 1000.0

# Discord Bot Gateway Settings
discord:
  bot-token: "YOUR_DISCORD_BOT_TOKEN_HERE"
  channel-id: "YOUR_DISCORD_CHANNEL_ID_HERE"
  enabled: false

# Rules Module Settings
rules:
  - "&61. &fBe respectful to other players."
  - "&62. &fNo cheating, hacking, or exploiting."
  - "&63. &fNo griefing or stealing in protected areas."
  - "&64. &fDo not spam or advertise in chat."
  - "&65. &fHave fun and play fair!"


